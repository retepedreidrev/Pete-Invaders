<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pete Invaders</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Press Start 2P', cursive;
}
canvas { display:block; margin:auto; }

.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

button {
  font-size: 20px;
  padding: 18px;
  border-radius: 50%;
  border: none;
  opacity: 0.8;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
  <button id="left">⬅️</button>
  <button id="shoot">🔥</button>
  <button id="right">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// === SPRITES ===
const playerImg = new Image();
playerImg.src = "https://i.imgur.com/6X12Z6b.png";

const enemyImg = new Image();
enemyImg.src = "https://i.imgur.com/8QfQK9p.png";

const bossImg = new Image();
bossImg.src = "https://i.imgur.com/Z6X9K6A.png";

// === LJUD ===
const shootSound = new Audio("https://actions.google.com/sounds/v1/retro/laser_1.ogg");
const explosionSound = new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");
const music = new Audio("https://actions.google.com/sounds/v1/ambiences/arcade_game_room.ogg");

music.loop = true;
music.volume = 0.3;

document.body.addEventListener("touchstart", () => music.play(), {once:true});
document.body.addEventListener("click", () => music.play(), {once:true});

// === GAME STATE ===
let score = 0;
let lives = 3;
let level = 1;

const player = {
  x: canvas.width/2 - 25,
  y: canvas.height - 80,
  w: 50,
  h: 40,
  speed: 6
};

let bullets = [];
let enemies = [];
let boss = null;

// === INPUT ===
let moveLeft=false, moveRight=false;

left.ontouchstart=()=>moveLeft=true;
left.ontouchend=()=>moveLeft=false;

right.ontouchstart=()=>moveRight=true;
right.ontouchend=()=>moveRight=false;

shoot.ontouchstart=fire;

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") moveLeft=true;
  if(e.key==="ArrowRight") moveRight=true;
  if(e.key===" ") fire();
});
document.addEventListener("keyup", e=>{
  if(e.key==="ArrowLeft") moveLeft=false;
  if(e.key==="ArrowRight") moveRight=false;
});

// === SHOOT ===
function fire(){
  shootSound.currentTime = 0;
  shootSound.play();

  bullets.push({
    x: player.x + player.w/2 - 3,
    y: player.y,
    w: 6,
    h: 15
  });
}

// === ENEMY FORMATION ===
function createWave(){
  enemies = [];
  for(let r=0;r<4;r++){
    for(let c=0;c<6;c++){
      enemies.push({
        x: 60 + c*60,
        y: 60 + r*50,
        w: 40,
        h: 30,
        dx: 2
      });
    }
  }
}

// === BOSS ===
function spawnBoss(){
  boss = {
    x: canvas.width/2 - 80,
    y: 60,
    w: 160,
    h: 80,
    hp: 40,
    dx: 3
  };
}

// === UPDATE ===
function update(){

  if(moveLeft && player.x>0) player.x -= player.speed;
  if(moveRight && player.x<canvas.width-player.w) player.x += player.speed;

  bullets.forEach((b,i)=>{
    b.y -= 8;
    if(b.y<0) bullets.splice(i,1);
  });

  let flip=false;
  enemies.forEach(e=>{
    e.x += e.dx;
    if(e.x<0 || e.x+e.w>canvas.width) flip=true;
  });

  if(flip){
    enemies.forEach(e=>{
      e.dx *= -1;
      e.y += 20;
    });
  }

  enemies.forEach((e,ei)=>{
    bullets.forEach((b,bi)=>{
      if(
        b.x<e.x+e.w &&
        b.x+b.w>e.x &&
        b.y<e.y+e.h &&
        b.y+b.h>e.y
      ){
        explosionSound.currentTime = 0;
        explosionSound.play();

        enemies.splice(ei,1);
        bullets.splice(bi,1);
        score += 10;
      }
    });

    if(e.y + e.h > player.y){
      lives = 0;
    }
  });

  if(level % 3 === 0 && !boss){
    spawnBoss();
  }

  if(boss){
    boss.x += boss.dx;
    if(boss.x<0 || boss.x+boss.w>canvas.width) boss.dx *= -1;

    bullets.forEach((b,bi)=>{
      if(
        b.x<boss.x+boss.w &&
        b.x+b.w>boss.x &&
        b.y<boss.y+boss.h &&
        b.y+b.h>boss.y
      ){
        explosionSound.play();
        boss.hp--;
        bullets.splice(bi,1);

        if(boss.hp<=0){
          score += 200;
          boss = null;
          level++;
          createWave();
        }
      }
    });
  }

  if(enemies.length===0 && !boss){
    level++;
    createWave();
  }

  if(lives<=0){
    alert("Game Over! Poäng: "+score);
    location.reload();
  }
}

// === DRAW ===
function draw(){

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Titel
  ctx.fillStyle="white";
  ctx.font="16px 'Press Start 2P'";
  ctx.fillText("Pete Invaders", canvas.width/2 - 110, 30);

  // Player
  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // Bullets
  ctx.fillStyle="white";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  // Enemies
  enemies.forEach(e=>{
    ctx.drawImage(enemyImg, e.x, e.y, e.w, e.h);
  });

  // Boss
  if(boss){
    ctx.drawImage(bossImg, boss.x, boss.y, boss.w, boss.h);
    ctx.fillText("BOSS HP: "+boss.hp, boss.x, boss.y-10);
  }

  // UI
  ctx.fillText("Score: "+score, 20, 60);
  ctx.fillText("Level: "+level, 20, 90);
  ctx.fillText("Lives: "+lives, 20, 120);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

createWave();
loop();
</script>

</body>
</html>
