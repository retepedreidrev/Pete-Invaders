<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pete Invaders</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #13203f 0%, #081020 60%, #03060d 100%);
      font-family: 'Press Start 2P', cursive;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    #shootBtn {
      position: fixed;
      right: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.20);
      background: radial-gradient(circle at 35% 30%, #ffe07a, #ff8c00 70%, #d24a00 100%);
      color: white;
      font-size: 30px;
      box-shadow: 0 0 22px rgba(255,140,0,0.45);
      z-index: 15;
      touch-action: manipulation;
    }

    #shootBtn:active {
      transform: scale(0.96);
    }

    #startOverlay,
    #nameOverlay,
    #leaderboardOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 30;
      background: rgba(0,0,0,0.82);
    }

    #nameOverlay,
    #leaderboardOverlay {
      display: none;
    }

    .card {
      width: min(92vw, 560px);
      background: rgba(10, 16, 30, 0.96);
      border: 2px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 24px 20px;
      color: white;
      text-align: center;
      box-shadow: 0 0 28px rgba(61, 167, 255, 0.22);
    }

    .card h1, .card h2 {
      margin-top: 0;
      line-height: 1.4;
      font-size: 18px;
    }

    .card p {
      font-size: 10px;
      line-height: 1.8;
      color: #dce8ff;
    }

    .card button, .card input {
      font-family: inherit;
    }

    #startBtn, #saveScoreBtn, #restartBtn {
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      font-size: 11px;
      color: white;
      margin-top: 14px;
    }

    #startBtn, #saveScoreBtn {
      background: linear-gradient(180deg, #34c8ff 0%, #226dff 100%);
      box-shadow: 0 0 18px rgba(52,200,255,0.35);
    }

    #restartBtn {
      background: linear-gradient(180deg, #48d97d 0%, #19884e 100%);
      box-shadow: 0 0 18px rgba(72,217,125,0.25);
    }

    #playerNameInput {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 12px;
      outline: none;
      text-align: center;
    }

    #leaderboardList {
      list-style: none;
      margin: 18px 0 0;
      padding: 0;
      text-align: left;
    }

    #leaderboardList li {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 9px;
      align-items: center;
    }

    #leaderboardList li span:nth-child(2) {
      color: #98d6ff;
    }

    #leaderboardList li span:nth-child(3) {
      color: #ffe07a;
    }

    #loadingText {
      font-size: 9px;
      color: #aac8ff;
      margin-top: 12px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="shootBtn" aria-label="Skjut">🔥</button>

  <div id="startOverlay">
    <div class="card">
      <h1>🚀 Pete Invaders</h1>
      <p>
        Tryck eller dra i styrfältet längst ner för att styra.<br>
        Skeppet åker mot din position med begränsad fart.<br>
        Varje skott kostar 2 poäng.
      </p>
      <button id="startBtn">Starta spelet</button>
    </div>
  </div>

  <div id="nameOverlay">
    <div class="card">
      <h2>💥 Game Over</h2>
      <p id="finalScoreText"></p>
      <input id="playerNameInput" maxlength="18" placeholder="Skriv ditt namn">
      <button id="saveScoreBtn">Skicka till topplistan</button>
      <div id="loadingText"></div>
    </div>
  </div>

  <div id="leaderboardOverlay">
    <div class="card">
      <h2>🏆 Global Topplista</h2>
      <ul id="leaderboardList"></ul>
      <button id="restartBtn">Spela igen</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8i5oobi59aBoazNvLQcNelvSPn5ppB9U",
      authDomain: "pete-invaders.firebaseapp.com",
      projectId: "pete-invaders",
      storageBucket: "pete-invaders.firebasestorage.app",
      messagingSenderId: "974343532639",
      appId: "1:974343532639:web:1e27c5b1662408aee32bea",
      measurementId: "G-EDCYGK29M6"
    };

    let db = null;
    let leaderboardEnabled = false;

    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      leaderboardEnabled = true;
    } catch (err) {
      console.error("Firebase kunde inte starta:", err);
    }

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const shootBtn = document.getElementById("shootBtn");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");
    const nameOverlay = document.getElementById("nameOverlay");
    const leaderboardOverlay = document.getElementById("leaderboardOverlay");
    const finalScoreText = document.getElementById("finalScoreText");
    const playerNameInput = document.getElementById("playerNameInput");
    const saveScoreBtn = document.getElementById("saveScoreBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leaderboardList = document.getElementById("leaderboardList");
    const loadingText = document.getElementById("loadingText");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      player.y = canvas.height - 170;
      player.targetX = Math.max(0, Math.min(canvas.width - player.w, player.targetX));
      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    }
    window.addEventListener("resize", resizeCanvas);

    let lastTouchEnd = 0;
    document.addEventListener("touchend", function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) event.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
    document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
    document.addEventListener("touchmove", e => {
      if (e.scale && e.scale !== 1) e.preventDefault();
    }, { passive: false });

    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (err) {
        console.log("Wake lock kunde inte aktiveras:", err);
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && gameStarted) {
        await requestWakeLock();
      }
    });

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tone(freq = 440, duration = 0.08, type = "square", volume = 0.03, rampDown = true) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      if (rampDown) {
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      }
      osc.stop(audioCtx.currentTime + duration);
    }

    function playShootSound() {
      tone(880, 0.04, "square", 0.03);
      setTimeout(() => tone(660, 0.03, "square", 0.02), 20);
    }

    function playEnemyHitSound() {
      tone(200, 0.05, "sawtooth", 0.035);
      setTimeout(() => tone(140, 0.05, "triangle", 0.025), 30);
    }

    function playPlayerHitSound() {
      tone(240, 0.08, "square", 0.05);
      setTimeout(() => tone(120, 0.14, "sawtooth", 0.04), 40);
    }

    function playGameOverSound() {
      tone(260, 0.10, "triangle", 0.05);
      setTimeout(() => tone(190, 0.12, "triangle", 0.05), 120);
      setTimeout(() => tone(130, 0.20, "sawtooth", 0.05), 260);
    }

    function playBossHitSound() {
      tone(110, 0.10, "sawtooth", 0.05);
      setTimeout(() => tone(90, 0.08, "square", 0.03), 40);
    }

    function playBossShootSound() {
      tone(300, 0.08, "square", 0.04);
      setTimeout(() => tone(260, 0.08, "square", 0.03), 30);
      setTimeout(() => tone(220, 0.08, "square", 0.02), 60);
    }

    let musicTimer = null;
    function startMusic() {
      if (musicTimer) return;
      const notes = [220, 262, 330, 392];
      let i = 0;
      musicTimer = setInterval(() => {
        tone(notes[i % notes.length], 0.09, "triangle", 0.012);
        i++;
      }, 420);
    }

    let gameStarted = false;
    let gameIsOver = false;
    let score = 0;
    let lives = 3;
    let level = 1;
    let fireCooldown = 0;
    let bombCooldown = 110;
    let hitFlash = 0;
    let bossShotCooldown = 90;
    let lifeLossAnimation = null;

    const player = {
      x: 160,
      targetX: 160,
      y: 500,
      w: 48,
      h: 48,
      emoji: "😄",
      speed: 6.4
    };

    let bullets = [];
    let enemies = [];
    let bombs = [];
    let stars = [];
    let boss = null;
    let inBossLevel = false;
    let currentEnemySpeed = 0.8;

    const enemyChoices = ["👾", "🛸", "🤖", "🐙", "💜", "💚", "💙", "❤️", "🌈"];

    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 2 + 0.5,
        s: Math.random() * 0.3 + 0.12
      });
    }

    function normalSpeedForLevel(level) {
      if (level <= 5) {
        return 0.78 + (level - 1) * 0.10;
      }
      const speedAt5 = 0.78 + (5 - 1) * 0.10;
      return speedAt5 * Math.pow(1.05, level - 5);
    }

    function bossHpForLevel(level) {
      return Math.max(10, 8 + level * 2);
    }

    function createWave() {
      enemies = [];
      boss = null;
      inBossLevel = level % 4 === 0;

      if (inBossLevel) {
        const size = 90;
        currentEnemySpeed = Math.min(1.0 + level * 0.06, 2.2);

        boss = {
          x: canvas.width / 2 - size / 2,
          y: 90,
          baseY: 90,
          w: size,
          h: size,
          emoji: "👹",
          dx: currentEnemySpeed,
          dyPhase: 0,
          hp: bossHpForLevel(level),
          maxHp: bossHpForLevel(level)
        };

        bossShotCooldown = 35 + Math.floor(Math.random() * 45);
        player.speed = currentEnemySpeed * 8;
        return;
      }

      const cols = 7;
      const rows = 4;
      const size = 28;
      const gapX = 10;
      const gapY = 10;
      const totalWidth = cols * size + (cols - 1) * gapX;
      const startX = Math.max(12, (canvas.width - totalWidth) / 2);
      const startY = 92;

      currentEnemySpeed = Math.min(normalSpeedForLevel(level), 3.6);
      player.speed = currentEnemySpeed * 8;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            x: startX + col * (size + gapX),
            y: startY + row * (size + gapY),
            size,
            dx: currentEnemySpeed,
            emoji: enemyChoices[(row * cols + col) % enemyChoices.length]
          });
        }
      }
    }

    function shoot() {
      if (!gameStarted || gameIsOver) return;
      if (fireCooldown > 0) return;

      score -= 2;
      playShootSound();

      bullets.push({
        x: player.x + player.w / 2 - 2,
        y: player.y + 2,
        w: 4,
        h: 14,
        speed: 8.2
      });

      fireCooldown = 9;
    }

    function dropBomb() {
      if (enemies.length === 0) return;
      const shooter = enemies[Math.floor(Math.random() * enemies.length)];
      bombs.push({
        x: shooter.x + shooter.size / 2 - 4,
        y: shooter.y + shooter.size - 2,
        w: 8,
        h: 16,
        speed: Math.min(2.0 + level * 0.18, 4.2),
        type: "enemy"
      });
    }

    function bossShoot() {
      if (!boss) return;
      playBossShootSound();

      const shotCount = 5;
      const spacing = 16;

      for (let i = 0; i < shotCount; i++) {
        const offset = (i - (shotCount - 1) / 2) * spacing;
        bombs.push({
          x: boss.x + boss.w / 2 + offset - 4,
          y: boss.y + boss.h - 6,
          w: 9,
          h: 18,
          speed: Math.min(2.8 + level * 0.18, 5.8),
          type: "boss"
        });
      }
    }

    function setPlayerTarget(touchX) {
      const clampedX = Math.max(0, Math.min(canvas.width, touchX));
      player.targetX = clampedX - player.w / 2;
      player.targetX = Math.max(0, Math.min(canvas.width - player.w, player.targetX));
    }

    canvas.addEventListener("touchstart", (e) => {
      if (!gameStarted || gameIsOver) return;
      const touch = e.touches[0];
      e.preventDefault();
      setPlayerTarget(touch.clientX);
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      if (!gameStarted || gameIsOver) return;
      const touch = e.touches[0];
      e.preventDefault();
      setPlayerTarget(touch.clientX);
    }, { passive: false });

    canvas.addEventListener("click", (e) => {
      if (!gameStarted || gameIsOver) return;
      setPlayerTarget(e.clientX);
    });

    shootBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      shoot();
    }, { passive: false });

    shootBtn.addEventListener("click", (e) => {
      e.preventDefault();
      shoot();
    });

    let moveLeft = false;
    let moveRight = false;

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") moveLeft = true;
      if (e.key === "ArrowRight") moveRight = true;
      if (e.key === " ") {
        e.preventDefault();
        shoot();
      }
    });

    document.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") moveLeft = false;
      if (e.key === "ArrowRight") moveRight = false;
    });

    startBtn.addEventListener("click", async () => {
      try {
        if (audioCtx.state !== "running") {
          await audioCtx.resume();
        }
        await requestWakeLock();
        startMusic();
      } catch (err) {
        console.log(err);
      }

      gameStarted = true;
      startOverlay.style.display = "none";
    });

    saveScoreBtn.addEventListener("click", async () => {
      const name = (playerNameInput.value || "").trim().slice(0, 18) || "Anon";
      localStorage.setItem("peteInvadersName", name);
      loadingText.textContent = "Sparar poäng...";

      try {
        if (leaderboardEnabled && db) {
          await addDoc(collection(db, "scores"), {
            name,
            score,
            level,
            createdAt: Date.now()
          });
        }
      } catch (err) {
        console.error(err);
        loadingText.textContent = "Kunde inte spara poängen.";
      }

      await showLeaderboard();
    });

    restartBtn.addEventListener("click", () => {
      location.reload();
    });

    async function showLeaderboard() {
      leaderboardList.innerHTML = "";
      nameOverlay.style.display = "none";
      leaderboardOverlay.style.display = "flex";

      try {
        let entries = [];

        if (leaderboardEnabled && db) {
          const snap = await getDocs(collection(db, "scores"));
          snap.forEach((doc) => entries.push(doc.data()));

          entries.sort((a, b) => {
            const scoreDiff = Number(b.score || 0) - Number(a.score || 0);
            if (scoreDiff !== 0) return scoreDiff;
            return Number(b.level || 0) - Number(a.level || 0);
          });

          entries = entries.slice(0, 10);
        } else {
          entries = [{ name: "Firebase saknas", level: 0, score: 0 }];
        }

        if (entries.length === 0) {
          leaderboardList.innerHTML = "<li><span>Inga poäng ännu</span><span>Lv 0</span><span>0</span></li>";
          return;
        }

        entries.forEach((entry, index) => {
          const li = document.createElement("li");
          const safeName = String(entry.name || "Anon");
          const safeLevel = Number(entry.level || 0);
          const safeScore = Number(entry.score || 0);
          li.innerHTML = `<span>${index + 1}. ${safeName}</span><span>Lv ${safeLevel}</span><span>${safeScore}</span>`;
          leaderboardList.appendChild(li);
        });
      } catch (err) {
        console.error(err);
        leaderboardList.innerHTML = "<li><span>Kunde inte läsa topplistan</span><span>Lv ?</span><span>!</span></li>";
      }
    }

    function loseLife() {
      if (gameIsOver) return;

      const lostLifeIndex = lives - 1;
      lifeLossAnimation = {
        index: lostLifeIndex,
        scale: 1,
        alpha: 1
      };

      lives--;
      hitFlash = 1.6;
      playPlayerHitSound();

      if (lives <= 0) {
        endGame();
      }
    }

    function movePlayerTowardTarget() {
      const diff = player.targetX - player.x;
      const maxMove = player.speed;

      if (Math.abs(diff) <= maxMove) {
        player.x = player.targetX;
      } else {
        player.x += Math.sign(diff) * maxMove;
      }

      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    }

    function updateLifeLossAnimation() {
      if (!lifeLossAnimation) return;
      lifeLossAnimation.scale += 0.12;
      lifeLossAnimation.alpha -= 0.08;
      if (lifeLossAnimation.alpha <= 0) {
        lifeLossAnimation = null;
      }
    }

    function update() {
      if (!gameStarted || gameIsOver) return;

      if (fireCooldown > 0) fireCooldown--;
      if (hitFlash > 0) hitFlash = Math.max(0, hitFlash - 0.05);
      updateLifeLossAnimation();

      if (moveLeft) player.targetX -= player.speed * 3;
      if (moveRight) player.targetX += player.speed * 3;
      player.targetX = Math.max(0, Math.min(canvas.width - player.w, player.targetX));
      movePlayerTowardTarget();

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
      }

      for (let i = bombs.length - 1; i >= 0; i--) {
        bombs[i].y += bombs[i].speed;
        const b = bombs[i];
        const hitPlayer =
          b.x < player.x + player.w &&
          b.x + b.w > player.x &&
          b.y < player.y + player.h &&
          b.y + b.h > player.y;

        if (hitPlayer) {
          bombs.splice(i, 1);
          loseLife();
          continue;
        }

        if (b.y > canvas.height + 20) bombs.splice(i, 1);
      }

      for (const star of stars) {
        star.y += star.s;
        if (star.y > canvas.height) {
          star.y = -2;
          star.x = Math.random() * canvas.width;
        }
      }

      if (boss) {
        boss.x += boss.dx;
        boss.dyPhase += 0.03;

        const minBossY = 70;
        const maxBossY = canvas.height * 0.5 - boss.h;
        const amplitude = Math.max(20, (maxBossY - boss.baseY) * 0.9);
        boss.y = boss.baseY + Math.sin(boss.dyPhase) * amplitude;

        if (boss.y > maxBossY) boss.y = maxBossY;
        if (boss.y < minBossY) boss.y = minBossY;

        if (boss.x <= 8 || boss.x + boss.w >= canvas.width - 8) {
          boss.dx *= -1;
        }

        bossShotCooldown--;
        if (bossShotCooldown <= 0) {
          bossShoot();
          bossShotCooldown = 35 + Math.floor(Math.random() * 45);
        }

        if (boss.y + boss.h >= player.y + 8) {
          lives = 0;
          endGame();
          return;
        }

        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          if (
            b.x < boss.x + boss.w &&
            b.x + b.w > boss.x &&
            b.y < boss.y + boss.h &&
            b.y + b.h > boss.y
          ) {
            bullets.splice(bi, 1);
            boss.hp--;
            playBossHitSound();

            if (boss.hp <= 0) {
              score += boss.maxHp * 4;
              boss = null;
              level++;
              createWave();
              break;
            }
          }
        }
      } else {
        let hitEdge = false;
        for (const enemy of enemies) {
          enemy.x += enemy.dx;
          if (enemy.x <= 8 || enemy.x + enemy.size >= canvas.width - 8) hitEdge = true;
        }

        if (hitEdge) {
          for (const enemy of enemies) {
            enemy.dx *= -1;
            enemy.y += 12;
          }
        }

        bombCooldown--;
        if (bombCooldown <= 0) {
          dropBomb();
          if (level >= 5 && Math.random() < 0.15) dropBomb();

          const minDelay = Math.max(35, 115 - level * 5);
          const maxDelay = Math.max(70, 170 - level * 6);
          bombCooldown = Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
        }

        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const enemy = enemies[ei];

          if (enemy.y + enemy.size >= player.y + 8) {
            lives = 0;
            endGame();
            return;
          }

          for (let bi = bullets.length - 1; bi >= 0; bi--) {
            const b = bullets[bi];
            if (
              b.x < enemy.x + enemy.size &&
              b.x + b.w > enemy.x &&
              b.y < enemy.y + enemy.size &&
              b.y + b.h > enemy.y
            ) {
              playEnemyHitSound();
              bullets.splice(bi, 1);
              enemies.splice(ei, 1);
              score += 10;
              break;
            }
          }
        }

        if (enemies.length === 0) {
          level++;
          createWave();
        }
      }
    }

    function drawLives() {
      const icon = "🚀";
      const spacing = 30;
      const startX = canvas.width - 20 - ((lives + (lifeLossAnimation ? 1 : 0)) * spacing);

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "22px serif";

      for (let i = 0; i < lives; i++) {
        ctx.globalAlpha = 1;
        ctx.fillText(icon, startX + i * spacing, 20);
      }

      if (lifeLossAnimation) {
        const x = startX + lifeLossAnimation.index * spacing;
        const y = 20;
        ctx.save();
        ctx.globalAlpha = Math.max(0, lifeLossAnimation.alpha);
        ctx.translate(x + 12, y + 12);
        ctx.scale(lifeLossAnimation.scale, lifeLossAnimation.scale);
        ctx.font = "22px serif";
        ctx.fillText(icon, -12, -12);
        ctx.restore();
        ctx.globalAlpha = 1;
      }
    }

    function drawControlArea() {
      const h = 72;
      const y = canvas.height - h;
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fillRect(0, y, canvas.width, h);

      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.font = "18px 'Press Start 2P'";
      ctx.fillText("←  →", canvas.width / 2, y + h / 2 + 2);
    }

    function drawBossHp() {
      if (!boss) return;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.font = "16px 'Press Start 2P'";
      ctx.fillStyle = "#ffffff";
      ctx.fillText(`${boss.hp}`, boss.x + boss.w / 2, boss.y - 22);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, "#102045");
      bg.addColorStop(0.48, "#091225");
      bg.addColorStop(1, "#02030a");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillStyle = "#ffffff";
      ctx.font = "12px 'Press Start 2P'";
      ctx.fillText(`LEVEL ${level}`, 16, 22);

      ctx.textAlign = "center";
      ctx.font = "22px 'Press Start 2P'";
      ctx.fillStyle = "#fff7b7";
      ctx.fillText(`${score}`, canvas.width / 2, 18);

      drawLives();
      drawControlArea();

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = `${player.h}px serif`;
      ctx.fillText(player.emoji, player.x, player.y);

      ctx.fillStyle = "#ffd95a";
      for (const b of bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      for (const bomb of bombs) {
        ctx.fillStyle = bomb.type === "boss" ? "#ff2e88" : "#ff5f57";
        ctx.beginPath();
        ctx.arc(
          bomb.x + bomb.w / 2,
          bomb.y + bomb.h / 2,
          bomb.type === "boss" ? 6 : 5,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      if (boss) {
        ctx.font = `${boss.h}px serif`;
        ctx.fillText(boss.emoji, boss.x, boss.y);
        drawBossHp();
      } else {
        for (const enemy of enemies) {
          ctx.font = `${enemy.size}px serif`;
          ctx.fillText(enemy.emoji, enemy.x, enemy.y);
        }
      }

      if (hitFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${Math.min(hitFlash * 0.9, 1)})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function endGame() {
      if (gameIsOver) return;
      gameIsOver = true;
      playGameOverSound();
      finalScoreText.textContent = `Poäng: ${score} • Level: ${level}`;
      playerNameInput.value = localStorage.getItem("peteInvadersName") || "";
      loadingText.textContent = leaderboardEnabled
        ? "Skriv namn och skicka poängen."
        : "Aktivera Firestore för global topplista.";
      nameOverlay.style.display = "flex";
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    resizeCanvas();
    createWave();
    loop();
  </script>
</body>
</html>
