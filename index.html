<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pete Invaders</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #13203f 0%, #081020 60%, #03060d 100%);
      font-family: 'Press Start 2P', cursive;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    #shootBtn {
      position: fixed;
      right: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.20);
      background: radial-gradient(circle at 35% 30%, #ffe07a, #ff8c00 70%, #d24a00 100%);
      color: white;
      font-size: 30px;
      box-shadow: 0 0 22px rgba(255,140,0,0.45);
      z-index: 15;
      touch-action: manipulation;
    }

    #shootBtn:active {
      transform: scale(0.96);
    }

    #startOverlay,
    #nameOverlay,
    #leaderboardOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 30;
      background: rgba(0,0,0,0.82);
    }

    #nameOverlay,
    #leaderboardOverlay {
      display: none;
    }

    .card {
      width: min(92vw, 520px);
      background: rgba(10, 16, 30, 0.96);
      border: 2px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 24px 20px;
      color: white;
      text-align: center;
      box-shadow: 0 0 28px rgba(61, 167, 255, 0.22);
    }

    .card h1, .card h2 {
      margin-top: 0;
      line-height: 1.4;
      font-size: 18px;
    }

    .card p {
      font-size: 10px;
      line-height: 1.8;
      color: #dce8ff;
    }

    .card button, .card input {
      font-family: inherit;
    }

    #startBtn, #saveScoreBtn, #restartBtn {
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      font-size: 11px;
      color: white;
      margin-top: 14px;
    }

    #startBtn, #saveScoreBtn {
      background: linear-gradient(180deg, #34c8ff 0%, #226dff 100%);
      box-shadow: 0 0 18px rgba(52,200,255,0.35);
    }

    #restartBtn {
      background: linear-gradient(180deg, #48d97d 0%, #19884e 100%);
      box-shadow: 0 0 18px rgba(72,217,125,0.25);
    }

    #playerNameInput {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 12px;
      outline: none;
      text-align: center;
    }

    #leaderboardList {
      list-style: none;
      margin: 18px 0 0;
      padding: 0;
      text-align: left;
    }

    #leaderboardList li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 10px;
    }

    #leaderboardList li span:last-child {
      color: #ffe07a;
    }

    #loadingText {
      font-size: 9px;
      color: #aac8ff;
      margin-top: 12px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="shootBtn" aria-label="Skjut">🔥</button>

  <div id="startOverlay">
    <div class="card">
      <h1>🚀 Pete Invaders</h1>
      <p>
        Dra fingret över skärmen för att styra.<br>
        Tryck på eldknappen för att skjuta.
      </p>
      <button id="startBtn">Starta spelet</button>
    </div>
  </div>

  <div id="nameOverlay">
    <div class="card">
      <h2>💥 Game Over</h2>
      <p id="finalScoreText"></p>
      <input id="playerNameInput" maxlength="18" placeholder="Skriv ditt namn">
      <button id="saveScoreBtn">Skicka till topplistan</button>
      <div id="loadingText"></div>
    </div>
  </div>

  <div id="leaderboardOverlay">
    <div class="card">
      <h2>🏆 Global Topplista</h2>
      <ul id="leaderboardList"></ul>
      <button id="restartBtn">Spela igen</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8i5oobi59aBoazNvLQcNelvSPn5ppB9U",
      authDomain: "pete-invaders.firebaseapp.com",
      projectId: "pete-invaders",
      storageBucket: "pete-invaders.firebasestorage.app",
      messagingSenderId: "974343532639",
      appId: "1:974343532639:web:1e27c5b1662408aee32bea",
      measurementId: "G-EDCYGK29M6"
    };

    let db = null;
    let leaderboardEnabled = false;

    try {
      if (firebaseConfig.apiKey) {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        leaderboardEnabled = true;
      }
    } catch (err) {
      console.error("Firebase kunde inte starta:", err);
    }

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const shootBtn = document.getElementById("shootBtn");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");
    const nameOverlay = document.getElementById("nameOverlay");
    const leaderboardOverlay = document.getElementById("leaderboardOverlay");
    const finalScoreText = document.getElementById("finalScoreText");
    const playerNameInput = document.getElementById("playerNameInput");
    const saveScoreBtn = document.getElementById("saveScoreBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leaderboardList = document.getElementById("leaderboardList");
    const loadingText = document.getElementById("loadingText");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      player.y = canvas.height - 110;
      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    }
    window.addEventListener("resize", resizeCanvas);

    let lastTouchEnd = 0;
    document.addEventListener("touchend", function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) event.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
    document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
    document.addEventListener("touchmove", e => {
      if (e.scale && e.scale !== 1) e.preventDefault();
    }, { passive: false });

    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (err) {
        console.log("Wake lock kunde inte aktiveras:", err);
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && gameStarted) {
        await requestWakeLock();
      }
    });

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tone(freq = 440, duration = 0.08, type = "square", volume = 0.03, rampDown = true) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();

      if (rampDown) {
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      }

      osc.stop(audioCtx.currentTime + duration);
    }

    function playShootSound() {
      tone(880, 0.04, "square", 0.03);
      setTimeout(() => tone(620, 0.03, "square", 0.02), 25);
    }

    function playEnemyHitSound() {
      tone(180, 0.05, "sawtooth", 0.035);
      setTimeout(() => tone(120, 0.06, "triangle", 0.025), 35);
    }

    function playPlayerHitSound() {
      tone(240, 0.08, "square", 0.05);
      setTimeout(() => tone(120, 0.12, "sawtooth", 0.04), 40);
    }

    function playGameOverSound() {
      tone(260, 0.10, "triangle", 0.05);
      setTimeout(() => tone(190, 0.12, "triangle", 0.05), 120);
      setTimeout(() => tone(130, 0.20, "sawtooth", 0.05), 260);
    }

    let musicTimer = null;
    function startMusic() {
      if (musicTimer) return;
      const notes = [220, 262, 330, 392];
      let i = 0;
      musicTimer = setInterval(() => {
        tone(notes[i % notes.length], 0.09, "triangle", 0.012);
        i++;
      }, 420);
    }

    let gameStarted = false;
    let gameIsOver = false;
    let score = 0;
    let lives = 3;
    let level = 1;
    let fireCooldown = 0;
    let bombCooldown = 70;
    let hitFlash = 0;

    const player = {
      x: 160,
      y: 500,
      w: 48,
      h: 48,
      emoji: "😄"
    };

    let bullets = [];
    let enemies = [];
    let bombs = [];
    let stars = [];

    const enemyChoices = ["👾", "🛸", "🤖", "🐙", "💜", "💚", "💙", "❤️", "🌈"];

    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 2 + 0.5,
        s: Math.random() * 0.3 + 0.12
      });
    }

    function createWave() {
      enemies = [];

      const cols = 8;
      const rows = 5;
      const size = 30;
      const gapX = 10;
      const gapY = 11;
      const totalWidth = cols * size + (cols - 1) * gapX;
      const startX = Math.max(12, (canvas.width - totalWidth) / 2);
      const startY = 92;

      const baseSpeed = Math.min(1.05 + (level - 1) * 0.15, 2.8);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            x: startX + col * (size + gapX),
            y: startY + row * (size + gapY),
            size,
            dx: baseSpeed,
            emoji: enemyChoices[(row * cols + col) % enemyChoices.length]
          });
        }
      }
    }

    function shoot() {
      if (!gameStarted || gameIsOver) return;
      if (fireCooldown > 0) return;

      playShootSound();

      bullets.push({
        x: player.x + player.w / 2 - 2,
        y: player.y + 2,
        w: 4,
        h: 14,
        speed: 8.6
      });

      fireCooldown = 8;
    }

    function dropBomb() {
      if (enemies.length === 0) return;

      const shooter = enemies[Math.floor(Math.random() * enemies.length)];
      bombs.push({
        x: shooter.x + shooter.size / 2 - 4,
        y: shooter.y + shooter.size - 2,
        w: 8,
        h: 16,
        speed: Math.min(2.4 + level * 0.28, 6.2)
      });
    }

    function movePlayerToTouch(touchX) {
      const clampedX = Math.max(0, Math.min(canvas.width, touchX));
      player.x = clampedX - player.w / 2;
      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
    }

    canvas.addEventListener("touchstart", (e) => {
      if (!gameStarted || gameIsOver) return;
      const touch = e.touches[0];
      e.preventDefault();
      movePlayerToTouch(touch.clientX);
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      if (!gameStarted || gameIsOver) return;
      const touch = e.touches[0];
      e.preventDefault();
      movePlayerToTouch(touch.clientX);
    }, { passive: false });

    shootBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      shoot();
    }, { passive: false });

    shootBtn.addEventListener("click", (e) => {
      e.preventDefault();
      shoot();
    });

    let moveLeft = false;
    let moveRight = false;

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") moveLeft = true;
      if (e.key === "ArrowRight") moveRight = true;
      if (e.key === " ") {
        e.preventDefault();
        shoot();
      }
    });

    document.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") moveLeft = false;
      if (e.key === "ArrowRight") moveRight = false;
    });

    startBtn.addEventListener("click", async () => {
      try {
        if (audioCtx.state !== "running") {
          await audioCtx.resume();
        }
        await requestWakeLock();
        startMusic();
      } catch (err) {
        console.log(err);
      }

      gameStarted = true;
      startOverlay.style.display = "none";
    });

    saveScoreBtn.addEventListener("click", async () => {
      const name = (playerNameInput.value || "").trim().slice(0, 18) || "Anon";
      localStorage.setItem("peteInvadersName", name);
      loadingText.textContent = "Sparar poäng...";

      try {
        if (leaderboardEnabled && db) {
          await addDoc(collection(db, "scores"), {
            name,
            score,
            createdAt: Date.now()
          });
        }
      } catch (err) {
        console.error(err);
        loadingText.textContent = "Kunde inte spara poängen.";
      }

      await showLeaderboard();
    });

    restartBtn.addEventListener("click", () => {
      location.reload();
    });

    async function showLeaderboard() {
      leaderboardList.innerHTML = "";
      nameOverlay.style.display = "none";
      leaderboardOverlay.style.display = "flex";

      try {
        let entries = [];

        if (leaderboardEnabled && db) {
          const q = query(
            collection(db, "scores"),
            orderBy("score", "desc"),
            limit(10)
          );
          const snap = await getDocs(q);
          snap.forEach((doc) => {
            entries.push(doc.data());
          });
        } else {
          entries = [{ name: "Firebase saknas", score: 0 }];
        }

        if (entries.length === 0) {
          leaderboardList.innerHTML = "<li><span>Inga poäng ännu</span><span>0</span></li>";
          return;
        }

        entries.forEach((entry, index) => {
          const li = document.createElement("li");
          const safeName = String(entry.name || "Anon");
          const safeScore = Number(entry.score || 0);
          li.innerHTML = `<span>${index + 1}. ${safeName}</span><span>${safeScore}</span>`;
          leaderboardList.appendChild(li);
        });
      } catch (err) {
        console.error(err);
        leaderboardList.innerHTML = "<li><span>Kunde inte läsa topplistan</span><span>!</span></li>";
      }
    }

    function loseLife() {
      if (gameIsOver) return;
      lives--;
      hitFlash = 1;
      playPlayerHitSound();
      bombs = bombs.filter(b => b.y < canvas.height + 30);

      if (lives <= 0) {
        endGame();
      }
    }

    function update() {
      if (!gameStarted || gameIsOver) return;

      if (fireCooldown > 0) fireCooldown--;
      if (hitFlash > 0) hitFlash = Math.max(0, hitFlash - 0.08);

      if (moveLeft) player.x -= 5.6;
      if (moveRight) player.x += 5.6;
      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
      }

      for (let i = bombs.length - 1; i >= 0; i--) {
        bombs[i].y += bombs[i].speed;

        const b = bombs[i];
        const hitPlayer =
          b.x < player.x + player.w &&
          b.x + b.w > player.x &&
          b.y < player.y + player.h &&
          b.y + b.h > player.y;

        if (hitPlayer) {
          bombs.splice(i, 1);
          loseLife();
          continue;
        }

        if (b.y > canvas.height + 20) bombs.splice(i, 1);
      }

      for (const star of stars) {
        star.y += star.s;
        if (star.y > canvas.height) {
          star.y = -2;
          star.x = Math.random() * canvas.width;
        }
      }

      let hitEdge = false;
      for (const enemy of enemies) {
        enemy.x += enemy.dx;
        if (enemy.x <= 8 || enemy.x + enemy.size >= canvas.width - 8) hitEdge = true;
      }

      if (hitEdge) {
        for (const enemy of enemies) {
          enemy.dx *= -1;
          enemy.y += 14;
        }
      }

      bombCooldown--;
      if (bombCooldown <= 0) {
        dropBomb();
        if (level >= 3 && Math.random() < 0.25) dropBomb();
        if (level >= 5 && Math.random() < 0.22) dropBomb();

        const minDelay = Math.max(12, 72 - level * 5);
        const maxDelay = Math.max(28, 118 - level * 6);
        bombCooldown = Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
      }

      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const enemy = enemies[ei];

        if (enemy.y + enemy.size >= player.y + 8) {
          lives = 0;
          endGame();
          return;
        }

        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          if (
            b.x < enemy.x + enemy.size &&
            b.x + b.w > enemy.x &&
            b.y < enemy.y + enemy.size &&
            b.y + b.h > enemy.y
          ) {
            playEnemyHitSound();
            bullets.splice(bi, 1);
            enemies.splice(ei, 1);
            score += 10;
            break;
          }
        }
      }

      if (enemies.length === 0) {
        level++;
        createWave();
      }
    }

    function drawLives() {
      const icon = "🚀";
      const spacing = 30;
      const startX = canvas.width - 20 - (lives * spacing);
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = "22px serif";
      for (let i = 0; i < lives; i++) {
        ctx.fillText(icon, startX + i * spacing, 20);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, "#102045");
      bg.addColorStop(0.48, "#091225");
      bg.addColorStop(1, "#02030a");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillStyle = "#ffffff";
      ctx.font = "12px 'Press Start 2P'";
      ctx.fillText(`LEVEL ${level}`, 16, 22);

      ctx.textAlign = "center";
      ctx.font = "18px 'Press Start 2P'";
      ctx.fillStyle = "#fff7b7";
      ctx.fillText(`${score}`, canvas.width / 2, 20);

      drawLives();

      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.font = `${player.h}px serif`;
      ctx.fillText(player.emoji, player.x, player.y);

      ctx.fillStyle = "#ffd95a";
      for (const b of bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      ctx.fillStyle = "#ff5f57";
      for (const bomb of bombs) {
        ctx.beginPath();
        ctx.arc(bomb.x + bomb.w / 2, bomb.y + bomb.h / 2, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const enemy of enemies) {
        ctx.font = `${enemy.size}px serif`;
        ctx.fillText(enemy.emoji, enemy.x, enemy.y);
      }

      if (hitFlash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${hitFlash * 0.85})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function endGame() {
      if (gameIsOver) return;
      gameIsOver = true;
      playGameOverSound();
      finalScoreText.textContent = `Poäng: ${score} • Level: ${level}`;
      playerNameInput.value = localStorage.getItem("peteInvadersName") || "";
      loadingText.textContent = leaderboardEnabled
        ? "Skriv namn och skicka poängen."
        : "Aktivera Firestore för global topplista.";
      nameOverlay.style.display = "flex";
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    resizeCanvas();
    createWave();
    loop();
  </script>
</body>
</html>
