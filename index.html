<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pete Invaders</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #142348 0%, #081221 58%, #03060d 100%);
      font-family: 'Press Start 2P', cursive;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    #topBar {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }

    #titleBadge {
      color: #fff7b7;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(255, 208, 0, 0.7), 0 0 18px rgba(255, 119, 0, 0.55);
    }

    #shootBtn {
      position: fixed;
      right: 18px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.2);
      background: radial-gradient(circle at 35% 30%, #ffe07a, #ff8c00 70%, #d24a00 100%);
      color: white;
      font-size: 30px;
      box-shadow: 0 0 22px rgba(255,140,0,0.45);
      z-index: 15;
      touch-action: manipulation;
    }

    #shootBtn:active {
      transform: scale(0.96);
    }

    #startOverlay,
    #gameOverOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
      background: rgba(0,0,0,0.82);
    }

    #gameOverOverlay {
      display: none;
      z-index: 30;
    }

    .card {
      width: min(92vw, 500px);
      background: rgba(10, 16, 30, 0.96);
      border: 2px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 24px 20px;
      color: white;
      text-align: center;
      box-shadow: 0 0 28px rgba(61, 167, 255, 0.22);
    }

    .card h1, .card h2 {
      margin-top: 0;
      line-height: 1.4;
      font-size: 18px;
    }

    .card p {
      font-size: 10px;
      line-height: 1.9;
      color: #dce8ff;
    }

    .card button {
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      font-family: inherit;
      font-size: 11px;
      color: white;
      margin-top: 14px;
    }

    #startBtn {
      background: linear-gradient(180deg, #34c8ff 0%, #226dff 100%);
      box-shadow: 0 0 18px rgba(52,200,255,0.35);
    }

    #restartBtn {
      background: linear-gradient(180deg, #48d97d 0%, #19884e 100%);
      box-shadow: 0 0 18px rgba(72,217,125,0.25);
    }
  </style>
</head>
<body>

  <div id="topBar">
    <div id="titleBadge">PETE INVADERS</div>
  </div>

  <canvas id="game"></canvas>

  <button id="shootBtn" aria-label="Skjut">🔥</button>

  <div id="startOverlay">
    <div class="card">
      <h1>🚀 Pete Invaders</h1>
      <p>
        Dra fingret över skärmen för att styra.<br>
        Tryck på eldknappen för att skjuta.
      </p>
      <button id="startBtn">Starta spelet</button>
    </div>
  </div>

  <div id="gameOverOverlay">
    <div class="card">
      <h2>💥 Game Over</h2>
      <p id="finalScoreText"></p>
      <button id="restartBtn">Spela igen</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const shootBtn = document.getElementById("shootBtn");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const finalScoreText = document.getElementById("finalScoreText");
    const restartBtn = document.getElementById("restartBtn");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      player.y = canvas.height - 110;
      player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));
    }

    window.addEventListener("resize", resizeCanvas);

    // Minska oönskad zoom
    let lastTouchEnd = 0;
    document.addEventListener("touchend", function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
    document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
    document.addEventListener("touchmove", e => {
      if (e.scale && e.scale !== 1) e.preventDefault();
    }, { passive: false });

    // Wake lock
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
        }
      } catch (err) {
        console.log("Wake lock kunde inte aktiveras:", err);
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && gameStarted) {
        await requestWakeLock();
      }
    });

    // Enkel retro-ljudmotor
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq = 440, duration = 0.08, type = "square", volume = 0.03) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    let musicTimer = null;
    function startMusic() {
      if (musicTimer) return;
      const notes = [220, 262, 330, 392];
      let i = 0;
      musicTimer = setInterval(() => {
        beep(notes[i % notes.length], 0.09, "triangle", 0.015);
        i++;
      }, 420);
    }

    // Speldata
    let gameStarted = false;
    let gameIsOver = false;
    let score = 0;
    let lives = 3;
    let level = 1;
    let fireCooldown = 0;
    let bombCooldown = 80;

    const player = {
      x: 160,
      y: 500,
      w: 48,
      h: 48,
      emoji: "😄"
    };

    let bullets = [];
    let enemies = [];
    let bombs = [];
    let stars = [];

    const enemyChoices = ["👾", "🛸", "🤖", "🦄", "🐙", "🍓", "💜", "💚", "💙", "❤️", "🌈"];

    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 2 + 0.5,
        s: Math.random() * 0.3 + 0.12
      });
    }

    function createWave() {
      enemies = [];

      const cols = 7;
      const rows = 5;
      const size = 30;
      const gapX = 12;
      const gapY = 12;
      const totalWidth = cols * size + (cols - 1) * gapX;
      const startX = Math.max(14, (canvas.width - totalWidth) / 2);
      const startY = 90;

      const baseSpeed = Math.min(0.8 + (level - 1) * 0.12, 2.1);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          enemies.push({
            x: startX + col * (size + gapX),
            y: startY + row * (size + gapY),
            size: size,
            dx: baseSpeed,
            emoji: enemyChoices[(row * cols + col) % enemyChoices.length]
          });
        }
      }
    }

    function shoot() {
      if (!gameStarted || gameIsOver) return;
      if (fireCooldown > 0) return;

      beep(820, 0.05, "square", 0.035);

      bullets.push({
        x: player.x + player.w / 2 - 2,
        y: player.y + 2,
        w: 4,
        h: 14,
        speed: 8
      });

      fireCooldown = 10;
    }

    function dropBomb() {
      if (enemies.length === 0) return;

      const shooter = enemies[Math.floor(Math.random() * enemies.length)];
      bombs.push({
        x: shooter.x + shooter.size / 2 - 3,
        y: shooter.y + shooter.size - 2,
        w: 6,
        h: 14,
        speed: Math.min(2 + level * 0.2, 5.5)
      });
    }

    // Direktstyrning med fingret:
    // fingrets x-position styr skeppets centrum direkt
    function movePlayerToTouch(touchX) {
      const playAreaRight = canvas.width - 110; // lämna plats för skjutknappen
      const clampedX = Math.max(0, Math.min(playAreaRight, touchX));
      player.x = clampedX - player.w / 2;
      player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));
    }

    canvas.addEventListener("touchstart", (e) => {
      if (!gameStarted || gameIsOver) return;
      const touch = e.touches[0];
      if (touch.clientX < canvas.width - 110) {
        e.preventDefault();
        movePlayerToTouch(touch.clientX);
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      if (!gameStarted || gameIsOver) return;
      const touch = e.touches[0];
      if (touch.clientX < canvas.width - 110) {
        e.preventDefault();
        movePlayerToTouch(touch.clientX);
      }
    }, { passive: false });

    shootBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      shoot();
    }, { passive: false });

    shootBtn.addEventListener("click", (e) => {
      e.preventDefault();
      shoot();
    });

    // Tangentbord på dator
    let moveLeft = false;
    let moveRight = false;

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") moveLeft = true;
      if (e.key === "ArrowRight") moveRight = true;
      if (e.key === " ") {
        e.preventDefault();
        shoot();
      }
    });

    document.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") moveLeft = false;
      if (e.key === "ArrowRight") moveRight = false;
    });

    startBtn.addEventListener("click", async () => {
      try {
        if (audioCtx.state !== "running") {
          await audioCtx.resume();
        }
        await requestWakeLock();
        startMusic();
      } catch (err) {
        console.log(err);
      }

      gameStarted = true;
      startOverlay.style.display = "none";
    });

    restartBtn.addEventListener("click", () => {
      location.reload();
    });

    function update() {
      if (!gameStarted || gameIsOver) return;

      if (fireCooldown > 0) fireCooldown--;

      if (moveLeft) player.x -= 5;
      if (moveRight) player.x += 5;
      player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
      }

      for (let i = bombs.length - 1; i >= 0; i--) {
        bombs[i].y += bombs[i].speed;

        const b = bombs[i];
        const hitPlayer =
          b.x < player.x + player.w &&
          b.x + b.w > player.x &&
          b.y < player.y + player.h &&
          b.y + b.h > player.y;

        if (hitPlayer) {
          beep(100, 0.12, "sawtooth", 0.05);
          bombs.splice(i, 1);
          lives--;
          continue;
        }

        if (b.y > canvas.height + 20) {
          bombs.splice(i, 1);
        }
      }

      for (const star of stars) {
        star.y += star.s;
        if (star.y > canvas.height) {
          star.y = -2;
          star.x = Math.random() * canvas.width;
        }
      }

      let hitEdge = false;
      for (const enemy of enemies) {
        enemy.x += enemy.dx;
        if (enemy.x <= 8 || enemy.x + enemy.size >= canvas.width - 8) {
          hitEdge = true;
        }
      }

      if (hitEdge) {
        for (const enemy of enemies) {
          enemy.dx *= -1;
          enemy.y += 12;
        }
      }

      // Bombfrekvens: få i början, fler senare
      bombCooldown--;
      if (bombCooldown <= 0) {
        dropBomb();
        const minDelay = Math.max(18, 90 - level * 6);
        const maxDelay = Math.max(40, 150 - level * 7);
        bombCooldown = Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;
      }

      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const enemy = enemies[ei];

        if (enemy.y + enemy.size >= player.y + 8) {
          lives = 0;
        }

        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          if (
            b.x < enemy.x + enemy.size &&
            b.x + b.w > enemy.x &&
            b.y < enemy.y + enemy.size &&
            b.y + b.h > enemy.y
          ) {
            beep(160, 0.07, "sawtooth", 0.03);
            bullets.splice(bi, 1);
            enemies.splice(ei, 1);
            score += 10;
            break;
          }
        }
      }

      if (enemies.length === 0) {
        level++;
        createWave();
      }

      if (lives <= 0) {
        endGame();
      }
    }

    function drawHudBox(x, y, w, h) {
      ctx.fillStyle = "rgba(6, 12, 26, 0.55)";
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 12);
      ctx.fill();
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, "#102045");
      bg.addColorStop(0.48, "#091225");
      bg.addColorStop(1, "#02030a");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }

      drawHudBox(12, 44, 210, 96);

      ctx.fillStyle = "#ffffff";
      ctx.font = "10px 'Press Start 2P'";
      ctx.fillText(`SCORE ${score}`, 24, 76);
      ctx.fillText(`LEVEL ${level}`, 24, 102);
      ctx.fillText(`LIV ${lives}`, 24, 128);

      ctx.textAlign = "left";
      ctx.textBaseline = "top";

      ctx.font = `${player.h}px serif`;
      ctx.fillText(player.emoji, player.x, player.y);

      ctx.fillStyle = "#ffd95a";
      for (const b of bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      ctx.fillStyle = "#ff5f57";
      for (const bomb of bombs) {
        ctx.beginPath();
        ctx.arc(bomb.x + bomb.w / 2, bomb.y + bomb.h / 2, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const enemy of enemies) {
        ctx.font = `${enemy.size}px serif`;
        ctx.fillText(enemy.emoji, enemy.x, enemy.y);
      }
    }

    function endGame() {
      gameIsOver = true;
      finalScoreText.textContent = `Poäng: ${score} • Level: ${level}`;
      gameOverOverlay.style.display = "flex";
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    resizeCanvas();
    createWave();
    loop();
  </script>
</body>
</html>
